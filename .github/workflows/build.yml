name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Phase 2 (Pandoc) will be inserted here ─────────────────
      # - name: Install Pandoc
      #   run: sudo apt-get install -y pandoc
      # - name: Compile .tex → Markdown
      #   run: |
      #     mkdir -p _posts
      #     for f in _tex/*.tex; do
      #       [ -f "$f" ] || continue
      #       slug=$(basename "$f" .tex)
      #       pandoc "$f" \
      #         --from latex \
      #         --to markdown+yaml_metadata_block \
      #         --mathjax \
      #         --lua-filter=_scripts/idea-links.lua \
      #         -o "_posts/${slug}.md"
      #     done
      # ───────────────────────────────────────────────────────────

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
